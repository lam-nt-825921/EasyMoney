components:
  schemas:
    AmountRequest:
      properties:
        amount:
          type: integer
          title: Amount
        card_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Card Id
      type: object
      required:
      - amount
      title: AmountRequest
    BankDto:
      properties:
        id:
          type: string
          title: Id
        name:
          type: string
          title: Name
        short_name:
          type: string
          title: Short Name
        bin_prefixes:
          items:
            type: string
          type: array
          title: Bin Prefixes
        logo_url:
          anyOf:
          - type: string
          - type: 'null'
          title: Logo Url
        supported_card_types:
          items:
            type: string
            enum:
            - DEBIT
            - CREDIT
          type: array
          title: Supported Card Types
      type: object
      required:
      - id
      - name
      - short_name
      - bin_prefixes
      - supported_card_types
      title: BankDto
    CardRequest:
      properties:
        bank_id:
          type: string
          title: Bank Id
        bank_name:
          type: string
          title: Bank Name
        card_type:
          type: string
          enum:
          - DEBIT
          - CREDIT
          title: Card Type
        card_number:
          type: string
          title: Card Number
        card_holder_name:
          type: string
          title: Card Holder Name
        expiry:
          type: string
          pattern: ^(0[1-9]|1[0-2])/[0-9]{4}$
          title: Expiry
          description: Card expiry in MM/YYYY format, for example 10/2026.
        cvv:
          type: string
          pattern: ^[0-9]{3,4}$
          title: CVV
          description: Card CVV/CVC security code as a string.
      type: object
      required:
      - bank_id
      - bank_name
      - card_type
      - card_number
      - card_holder_name
      - expiry
      - cvv
      title: CardRequest
    ContractCreateRequest:
      properties:
        application_id:
          type: string
          title: Application Id
      type: object
      required:
      - application_id
      title: ContractCreateRequest
    ContractOtpRequestResultDto:
      properties:
        contract_id:
          type: string
          title: Contract Id
        purpose:
          type: string
          default: SIGN_CONTRACT
          title: Purpose
        otp:
          type: string
          title: Otp
        expires_at:
          anyOf:
          - type: integer
          - type: 'null'
          title: Expires At
      type: object
      required:
      - contract_id
      - otp
      title: ContractOtpRequestResultDto
    ContractSignRequest:
      properties:
        otp:
          type: string
          title: Otp
        purpose:
          type: string
          default: SIGN_CONTRACT
          title: Purpose
      type: object
      required:
      - otp
      title: ContractSignRequest
    ContractSignResultDto:
      properties:
        contract_id:
          type: string
          title: Contract Id
        application_id:
          type: string
          title: Application Id
        status:
          type: string
          title: Status
        debt_id:
          type: integer
          title: Debt Id
        disbursed_amount:
          type: number
          title: Disbursed Amount
        reward_points_added:
          type: integer
          title: Reward Points Added
        total_reward_points:
          type: integer
          title: Total Reward Points
        credit_score_delta:
          type: integer
          title: Credit Score Delta
        credit_score:
          type: integer
          title: Credit Score
      type: object
      required:
      - contract_id
      - application_id
      - status
      - debt_id
      - disbursed_amount
      - reward_points_added
      - total_reward_points
      - credit_score_delta
      - credit_score
      title: ContractSignResultDto
    CreditScoreDto:
      properties:
        credit_score:
          type: integer
          title: Credit Score
        tier:
          type: string
          title: Tier
        min_score:
          type: integer
          title: Min Score
          default: 0
        max_score:
          type: integer
          title: Max Score
          default: 1000
        total_reward_points:
          type: integer
          title: Total Reward Points
        explanation:
          type: string
          title: Explanation
      type: object
      required:
      - credit_score
      - tier
      - total_reward_points
      - explanation
      title: CreditScoreDto
    LoanContractDetailDto:
      properties:
        id:
          type: string
          title: Id
        application_id:
          type: string
          title: Application Id
        contract_number:
          type: string
          title: Contract Number
        amount:
          type: integer
          title: Amount
        term_months:
          type: integer
          title: Term Months
        interest_rate:
          type: number
          title: Interest Rate
        approved_at:
          type: integer
          title: Approved At
        status:
          type: string
          title: Status
        content:
          type: string
          title: Content
        html_content:
          anyOf:
          - type: string
          - type: 'null'
          title: Html Content
        otp_required:
          type: boolean
          title: Otp Required
      type: object
      required:
      - id
      - application_id
      - contract_number
      - amount
      - term_months
      - interest_rate
      - approved_at
      - status
      - content
      - otp_required
      title: LoanContractDetailDto
    RepaymentEstimateDto:
      properties:
        debt_id:
          type: integer
          title: Debt Id
        repay_type:
          type: string
          enum:
          - MONTHLY
          - FULL_EARLY
          title: Repay Type
        payment_method:
          type: string
          enum:
          - WALLET
          - CARD
          default: WALLET
          title: Payment Method
        amount_due:
          type: number
          title: Amount Due
        principal_due:
          type: number
          title: Principal Due
        interest_due:
          type: number
          title: Interest Due
        penalty_fee:
          type: number
          title: Penalty Fee
        discount_amount:
          type: number
          title: Discount Amount
        reward_points_preview:
          type: integer
          title: Reward Points Preview
        currency:
          type: string
          default: VND
          title: Currency
        debt_status_after_payment:
          type: string
          title: Debt Status After Payment
      type: object
      required:
      - debt_id
      - repay_type
      - amount_due
      - principal_due
      - interest_due
      - penalty_fee
      - discount_amount
      - reward_points_preview
      - debt_status_after_payment
      title: RepaymentEstimateDto
    RepayResultDto:
      properties:
        debt_id:
          type: integer
          title: Debt Id
        repay_type:
          type: string
          title: Repay Type
        amount_paid:
          type: number
          title: Amount Paid
        reward_points_added:
          type: integer
          title: Reward Points Added
        total_reward_points:
          type: integer
          title: Total Reward Points
        credit_score_delta:
          type: integer
          title: Credit Score Delta
        credit_score:
          type: integer
          title: Credit Score
        debt_status:
          type: string
          title: Debt Status
      type: object
      required:
      - debt_id
      - repay_type
      - amount_paid
      - reward_points_added
      - total_reward_points
      - credit_score_delta
      - credit_score
      - debt_status
      title: RepayResultDto
    AutoDeductionRequest:
      properties:
        enabled:
          type: boolean
          title: Enabled
      type: object
      required:
      - enabled
      title: AutoDeductionRequest
    Body_capture_face_api_v1_ekyc_capture_face_post:
      properties:
        image:
          anyOf:
          - type: string
            format: binary
          - type: 'null'
          title: Image
        face_image:
          anyOf:
          - type: string
            format: binary
          - type: 'null'
          title: Face Image
        frontIdImage:
          anyOf:
          - type: string
            format: binary
          - type: 'null'
          title: Frontidimage
        backIdImage:
          anyOf:
          - type: string
            format: binary
          - type: 'null'
          title: Backidimage
        meta:
          anyOf:
          - type: string
          - type: 'null'
          title: Meta
