contract_version: 2026-06-02.2-backend-design-target
source:
  backend_source: not included in frontend repo
  fastapi_app: mock_server.main:app
  raw_openapi_file: documents/backend_openapi.yaml
active_design:
  status: target backend design for the 2026-06-02 system fix batch 2; it supersedes older
    frontend snapshot details when conflicts exist.
  frontend_task_source: documents/AGENT_TASKS.md
  app_defaults:
    language: vi
    theme: light
    frontend_switching_ui: disabled in production
  debt_visibility:
    default_include_paid: false
    frontend_must_filter_paid: true
  notification_isolation:
    user_scope: all notification list/read/read-all/clear operations are scoped to
      the authenticated user.
    new_registered_user_default: "GET /api/v1/notifications returns data: [] unless
      notifications were created for that exact user.
      "
    frontend_cache_rule: mobile must key Room/cache rows by current authenticated user id
      and must not display seed user notifications after register/login switch.
  score_policy:
    reward_points: loyalty points, spendable in rewards; not used as underwriting score.
    credit_score: backend-owned underwriting score exposed through /api/v1/user/credit-score.
    easy_test_policy: verified users start around 620, incomplete eKYC users around
      520, completed repayments increase score, overdue/rejected activity decreases score.
  new_backend_capabilities:
  - reward points are added after disbursement and after debt completion
  - credit score is separate from reward points and exposed by API
  - repayment estimate is available before MONTHLY and FULL_EARLY payment
  - canonical contract create/detail endpoints live under /api/v1/loan/contracts
  - contract signing OTP is generated, returned, delivered by FCM, and verified on sign
  - disbursement creates notification and FCM push with debt navigation target
  - wallet recent_flows are newest-first by timestamp descending
  - card add/verify uses bank metadata, expiry MM/YYYY, cvv, and field_errors
runtime:
  framework: FastAPI
  database: SQLite via SQLModel
  public_base_url: https://easymoney.lamgd.dev
  local_run_command: python -m uvicorn mock_server.main:app --reload --host 0.0.0.0
    --port 8000
  servers:
    public_tunnel: https://easymoney.lamgd.dev
    desktop_local: http://localhost:8000
    android_emulator_local: http://10.0.2.2:8000
seed_contract:
  purpose: Demo-quality canonical database for customer presentation.
  seed_command: backend-owned; frontend agents must not assume backend source is available
  default_public_base_url: https://easymoney.lamgd.dev
  demo_users:
  - phone: 0987654321
    password: '123'
    token: mock_access_token_1
    persona: verified high-score active borrower
  - phone: 0912345678
    password: '123'
    token: mock_access_token_2
    persona: verified lower-score borrower
  - phone: 0909090909
    password: '123'
    token: mock_access_token_3
    persona: incomplete eKYC user
  registered_user_behavior: POST /api/v1/auth/register creates User and EasyMoney
    wallet Account only; it must not create a default payment Card. New user /api/v1/payment/cards
    returns an empty list until add-card succeeds.
banner_contract:
  frontend_target_types:
    LOAN: target_id must be a loan package id; frontend navigates LoanDetail.
    EVENT: target_id must be an event id; frontend navigates EventDetail; EventInfo.action_url
      may be a native deeplink or HTTPS WebView URL.
    WEB: target_id must be an absolute HTTPS URL for current frontend LinkHandler.
      Backend exposes the same URL path as a GET endpoint returning text/html.
  canonical_public_urls:
  - https://easymoney.lamgd.dev/event/e1
  - https://easymoney.lamgd.dev/pages/security-policy
  - https://easymoney.lamgd.dev/pages/credit-score-guide
  - https://easymoney.lamgd.dev/cskh
  html_resource_routes:
  - /event/{id}
  - /pages/{slug}
  - /cskh
