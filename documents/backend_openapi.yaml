components:
  schemas:
    AmountRequest:
      properties:
        amount:
          type: integer
          title: Amount
        card_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Card Id
      type: object
      required:
      - amount
      title: AmountRequest
    BankDto:
      properties:
        id:
          type: string
          title: Id
        name:
          type: string
          title: Name
        short_name:
          type: string
          title: Short Name
        bin_prefixes:
          items:
            type: string
          type: array
          title: Bin Prefixes
        logo_url:
          anyOf:
          - type: string
          - type: 'null'
          title: Logo Url
        supported_card_types:
          items:
            type: string
            enum:
            - DEBIT
            - CREDIT
          type: array
          title: Supported Card Types
      type: object
      required:
      - id
      - name
      - short_name
      - bin_prefixes
      - supported_card_types
      title: BankDto
    CardRequest:
      properties:
        bank_id:
          type: string
          title: Bank Id
        bank_name:
          type: string
          title: Bank Name
        card_type:
          type: string
          enum:
          - DEBIT
          - CREDIT
          title: Card Type
        card_number:
          type: string
          title: Card Number
        card_holder_name:
          type: string
          title: Card Holder Name
        expiry:
          type: string
          pattern: ^(0[1-9]|1[0-2])/[0-9]{4}$
          title: Expiry
          description: Card expiry in MM/YYYY format, for example 10/2026.
        cvv:
          type: string
          pattern: ^[0-9]{3,4}$
          title: CVV
          description: Card CVV/CVC security code as a string.
      type: object
      required:
      - bank_id
      - bank_name
      - card_type
      - card_number
      - card_holder_name
      - expiry
      - cvv
      title: CardRequest
    ContractCreateRequest:
      properties:
        application_id:
          type: string
          title: Application Id
      type: object
      required:
      - application_id
      title: ContractCreateRequest
    ContractOtpRequestResultDto:
      properties:
        contract_id:
          type: string
          title: Contract Id
        purpose:
          type: string
          default: SIGN_CONTRACT
          title: Purpose
        otp:
          type: string
          title: Otp
        expires_at:
          anyOf:
          - type: integer
          - type: 'null'
          title: Expires At
      type: object
      required:
      - contract_id
      - otp
      title: ContractOtpRequestResultDto
