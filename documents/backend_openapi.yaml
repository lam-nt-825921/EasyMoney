openapi: 3.1.0
info:
  title: EasyMoney Mock API
  version: 2026-06-02.2-backend-design-target
x-backend-design-2026-06-02:
  status: target backend design for system fix batch 2; generated snapshot details
    below are superseded by this section and the added target paths/schemas when conflicts exist.
  frontend_task_source: documents/AGENT_TASKS.md
  app_defaults:
    data_source_mode: remote
    language: vi
    theme: light
    api_base_url: https://easymoney.lamgd.dev/
  score_policy:
    reward_points: loyalty points, separate from credit score.
    credit_score: backend-owned underwriting score from /api/v1/user/credit-score.
  notification_isolation:
    user_scope: notification list/read/read-all/clear operations are scoped to authenticated user.
    new_registered_user_default: GET /api/v1/notifications returns an empty list unless
      notifications exist for that exact user.
    tap_routing_rule: frontend preserves target_type/target_id through app startup and
      login; authenticated notification taps must not force Login.
  contract_content:
    company_name: EasyMoney
    detail_rule: LoanContractDetailDto.content/html_content should contain realistic
      loan-agreement text using borrower profile data, loan terms, repayment terms,
      fees, and EasyMoney as lender.
    debt_view_rule: frontend may view a debt contract with GET /api/v1/loan/contracts/{contract_id}
      using CONTRACT_<LoanDebtDto.application_id> when no explicit contract_id exists.
  fcm_payloads:
    CONTRACT_SIGN_OTP:
      type: CONTRACT_SIGN_OTP
      purpose: SIGN_CONTRACT
      contract_id: CONTRACT_APP_XXXXXXXX
      otp: '123456'
      expires_at: '1717240300000'
      title: Ma OTP ky hop dong
      body: Ma OTP ky hop dong vay EasyMoney cua ban la 123456. Ma co hieu luc trong
        5 phut.
    LOAN_APPLICATION_APPROVED:
      type: LOAN_APPLICATION_APPROVED
      application_id: APP_XXXXXXXX
      contract_id: CONTRACT_APP_XXXXXXXX
      target_type: CONTRACT
      target_id: CONTRACT_APP_XXXXXXXX
    LOAN_DISBURSED:
      type: LOAN_DISBURSED
      contract_id: CONTRACT_APP_XXXXXXXX
      debt_id: '12'
      target_type: LOAN_DEBT
      target_id: '12'
