          type: string
          title: Application Id
        status:
          type: string
          title: Status
        debt_id:
          type: integer
          title: Debt Id
        disbursed_amount:
          type: number
          title: Disbursed Amount
        reward_points_added:
          type: integer
          title: Reward Points Added
        total_reward_points:
          type: integer
          title: Total Reward Points
        credit_score_delta:
          type: integer
          title: Credit Score Delta
        credit_score:
